provides:
  rest:
    "/users":
      get:
        responses:
          '200': Users
    "/users/{uuid}":
      get:
        responses:
          '200': User
          '404': NotFound

schemas:
  User:
    type: object
    properties:
      uuid:
        type: string
      email:
        type: string

  Users:
    type: array
    items:
      "$ref": User

  NotFound:
    type: object
    properties:
      message:
        type: string
